<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess QNN - Adaptive Learning Chess AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .header p {
            font-size: 1.1em;
            color: #aaa;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            color: #00d4ff;
            font-weight: bold;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .board-section {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0;
            background: #333;
            margin-bottom: 20px;
            border: 3px solid #00d4ff;
            border-radius: 4px;
            aspect-ratio: 1;
        }

        .square {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            cursor: pointer;
            border: 1px solid rgba(0, 212, 255, 0.2);
            user-select: none;
            transition: all 0.2s;
        }

        .square:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .square.light {
            background: #d4c9b8;
            color: #222;
        }

        .square.dark {
            background: #8b7765;
            color: #eee;
        }

        .square.selected {
            background: rgba(255, 215, 0, 0.5) !important;
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .square.highlight {
            background: rgba(0, 255, 0, 0.3) !important;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .select-control {
            padding: 10px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #eee;
            border-radius: 6px;
            font-size: 1em;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
        }

        .info-section {
            margin-bottom: 20px;
        }

        .info-section h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .info-content {
            color: #ccc;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .move-list {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .move-item {
            padding: 5px;
            margin: 2px 0;
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            border-radius: 2px;
        }

        .training-section {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            grid-column: 1 / -1;
        }

        .training-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .training-card {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid #00d4ff;
            border-radius: 6px;
            padding: 15px;
        }

        .training-card h4 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff 0%, #00ff88 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>♟️ Chess QNN - Adaptive Learning AI ♟️</h1>
            <p>Evolving Chess AI that learns from every game</p>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="gamesPlayed">0</div>
                <div class="stat-label">Games Played</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winRate">0%</div>
                <div class="stat-label">Win Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="eloRating">1200</div>
                <div class="stat-label">Estimated ELO</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="networkVersion">v1</div>
                <div class="stat-label">Network Version</div>
            </div>
        </div>

        <div class="main-content">
            <div class="board-section">
                <h2 style="margin-bottom: 15px; color: #00d4ff;">Game Board</h2>
                <div class="chess-board" id="chessBoard"></div>
                <div class="controls">
                    <div class="control-group">
                        <select id="playerColor" class="select-control">
                            <option value="white">Play as White</option>
                            <option value="black">Play as Black</option>
                        </select>
                        <select id="aiLevel" class="select-control">
                            <option value="easy">AI: Easy</option>
                            <option value="medium" selected>AI: Medium</option>
                            <option value="hard">AI: Hard</option>
                            <option value="stockfish">AI: Stockfish</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <button onclick="newGame()">New Game</button>
                        <button onclick="undoMove()" id="undoBtn" disabled>Undo</button>
                        <button onclick="resign()" id="resignBtn" disabled>Resign</button>
                    </div>
                </div>
            </div>

            <div class="info-panel">
                <div class="info-section">
                    <h3>Status</h3>
                    <div id="gameStatus">Initializing...</div>
                </div>
                <div class="info-section">
                    <h3>Moves</h3>
                    <div class="move-list" id="moveList"></div>
                </div>
                <div class="info-section">
                    <h3>AI Analysis</h3>
                    <div id="aiAnalysis" style="color: #00ff88;"></div>
                </div>
            </div>
        </div>

        <div class="training-section">
            <h2 style="margin-bottom: 20px; color: #00d4ff;">🧠 Training Dashboard</h2>
            <div class="training-grid">
                <div class="training-card">
                    <h4>Accuracy</h4>
                    <div class="progress-bar">
                        <div class="progress-fill" id="accuracyBar" style="width: 60%"></div>
                    </div>
                    <div style="font-size: 0.9em; color: #aaa;"><span id="accuracy">60</span>%</div>
                </div>
                <div class="training-card">
                    <h4>Model Updates</h4>
                    <div style="color: #00ff88; font-size: 2em; font-weight: bold;" id="modelUpdates">0</div>
                </div>
                <div class="training-card">
                    <h4>Learning Rate</h4>
                    <div style="color: #00d4ff;"><span id="learningRate">0.001</span></div>
                </div>
            </div>
            <div style="margin-top: 15px;">
                <button onclick="exportNetwork()" style="margin-right: 10px;">Export Network</button>
                <button onclick="importNetwork()" style="margin-right: 10px;">Import Network</button>
                <button onclick="resetNetwork()">Reset Network</button>
            </div>
        </div>
    </div>

    <script src="chess.js"></script>
    <script src="qnn.js"></script>
    <script src="game.js"></script>
</body>
</html>
